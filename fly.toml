# fly.toml app configuration file generated for trading-phantich-wyckoff on 2026-07-05T03:31:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trading-phantich-wyckoff'
primary_region = 'nrt'

[build]

[deploy]
  strategy = 'rolling'

[processes]
  app = 'python -m app.main'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
